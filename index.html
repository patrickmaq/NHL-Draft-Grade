<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Board — 2026 NHL Draft Grader</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #fbfcef;
  --surface: #13161A;
  --surface2: #1A1E24;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --gold: #D4AF37;
  --gold-dim: rgba(212,175,55,0.15);
  --gold-glow: rgba(212,175,55,0.08);
  --blue: #1A3A5C;
  --blue-bright: #2A5A8C;
  --text: #F0F2F5;
  --text-muted: #6B7280;
  --text-dim: #9CA3AF;
  --green: #22C55E;
  --yellow: #EAB308;
  --orange: #F97316;
  --red: #EF4444;
  --grade-a: #22C55E;
  --grade-b: #86EFAC;
  --grade-c: #EAB308;
  --grade-d: #F97316;
  --grade-f: #EF4444;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* Top glow */
body::after {
  content: '';
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(212,175,55,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.wrapper {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* Header */
header {
  padding: 48px 0 40px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  margin-bottom: 48px;
}

.logo {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.logo-mark {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  letter-spacing: 0.08em;
  line-height: 1;
  color: var(--text);
}

.logo-mark span {
  color: var(--gold);
}

.logo-sub {
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
}

.header-right {
  text-align: right;
}

.draft-year {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.15em;
  color: var(--gold);
}

.draft-label {
  font-size: 0.68rem;
  color: var(--text-muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 2px;
}

/* Team selector */
.section-label {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 12px;
  font-weight: 600;
}

.team-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
  margin-bottom: 40px;
}

.team-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 12px;
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: center;
  letter-spacing: 0.02em;
}

.team-btn:hover {
  border-color: var(--border2);
  color: var(--text);
  background: var(--surface2);
}

.team-btn.active {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--gold-glow);
}

/* Pick builder */
.pick-builder {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px;
  margin-bottom: 32px;
}

.pick-builder h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: 0.1em;
  color: var(--text);
  margin-bottom: 20px;
}

.pick-row {
  display: grid;
  grid-template-columns: 100px 1fr 120px auto;
  gap: 12px;
  align-items: center;
  margin-bottom: 12px;
}

.pick-row select,
.pick-row input {
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
  appearance: none;
  -webkit-appearance: none;
}

.pick-row select:focus,
.pick-row input:focus {
  border-color: var(--gold);
}

.pick-row input::placeholder {
  color: var(--text-muted);
}

.pick-row select option {
  background: var(--bg);
}

.remove-btn {
  background: none;
  border: 1px solid rgba(239,68,68,0.2);
  color: rgba(239,68,68,0.5);
  width: 36px;
  height: 36px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1rem;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.remove-btn:hover {
  border-color: var(--red);
  color: var(--red);
  background: rgba(239,68,68,0.08);
}

.add-pick-btn {
  background: none;
  border: 1px dashed var(--border2);
  color: var(--text-muted);
  padding: 10px 20px;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
  letter-spacing: 0.05em;
}

.add-pick-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.grade-btn {
  display: block;
  width: 100%;
  background: var(--gold);
  color: var(--bg);
  border: none;
  padding: 16px;
  border-radius: 8px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.15em;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-top: 20px;
}

.grade-btn:hover {
  background: #E8C84A;
  transform: translateY(-1px);
}

.grade-btn:active {
  transform: translateY(0);
}

/* Results */
.results {
  display: none;
}

.results.visible {
  display: block;
  animation: fadeUp 0.5s ease both;
}

/* Overall grade card */
.overall-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 32px;
}

.grade-circle {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  letter-spacing: 0.05em;
  border: 2px solid;
  position: relative;
}

.grade-circle::after {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  opacity: 0.15;
}

.grade-A { color: var(--green); border-color: var(--green); background: rgba(34,197,94,0.08); }
.grade-A::after { background: var(--green); }
.grade-B { color: #86EFAC; border-color: #86EFAC; background: rgba(134,239,172,0.08); }
.grade-B::after { background: #86EFAC; }
.grade-C { color: var(--yellow); border-color: var(--yellow); background: rgba(234,179,8,0.08); }
.grade-C::after { background: var(--yellow); }
.grade-D { color: var(--orange); border-color: var(--orange); background: rgba(249,115,22,0.08); }
.grade-D::after { background: var(--orange); }
.grade-F { color: var(--red); border-color: var(--red); background: rgba(239,68,68,0.08); }
.grade-F::after { background: var(--red); }

.overall-info {
  flex: 1;
}

.overall-team {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  letter-spacing: 0.08em;
  color: var(--text);
  margin-bottom: 6px;
}

.overall-summary {
  font-size: 0.9rem;
  color: var(--text-dim);
  line-height: 1.6;
  max-width: 500px;
}

.overall-score {
  text-align: right;
  flex-shrink: 0;
}

.score-num {
  font-family: 'DM Mono', monospace;
  font-size: 2rem;
  font-weight: 500;
  color: var(--gold);
  line-height: 1;
}

.score-label {
  font-size: 0.65rem;
  color: var(--text-muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 4px;
}

/* Individual pick results */
.pick-result {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 16px;
  animation: fadeUp 0.4s ease both;
}

.pick-result-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 16px;
}

.pick-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.round-badge {
  background: var(--gold-dim);
  color: var(--gold);
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.pick-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.05em;
  color: var(--text);
}

.pick-details {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.pick-grade-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 0.05em;
  padding: 6px 16px;
  border-radius: 8px;
  border: 1.5px solid;
  flex-shrink: 0;
}

/* Stat bars */
.stat-bars {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px 24px;
  margin-bottom: 16px;
}

.stat-bar-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.stat-bar-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.stat-bar-name {
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 500;
}

.stat-bar-value {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  font-weight: 500;
}

.bar-track {
  height: 4px;
  background: var(--bg);
  border-radius: 2px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0%;
}

.pick-verdict {
  font-size: 0.82rem;
  color: var(--text-dim);
  line-height: 1.6;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

/* Comp tag */
.comp-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text-dim);
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 0.72rem;
  margin-top: 8px;
  margin-right: 6px;
}

.comp-tag span {
  color: var(--gold);
  font-weight: 600;
}

/* No team selected state */
.no-team {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-size: 0.85rem;
  letter-spacing: 0.05em;
}

/* Divider */
.divider {
  height: 1px;
  background: var(--border);
  margin: 40px 0;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media (max-width: 600px) {
  .pick-row {
    grid-template-columns: 80px 1fr;
    grid-template-rows: auto auto;
  }
  .pick-row .round-select { grid-column: 1; }
  .pick-row .player-input { grid-column: 2; }
  .pick-row .position-select { grid-column: 1; }
  .pick-row .remove-btn { grid-column: 2; justify-self: end; }
  .stat-bars { grid-template-columns: 1fr; }
  .overall-card { flex-direction: column; gap: 20px; }
  .overall-score { text-align: left; }
  header { flex-direction: column; align-items: flex-start; gap: 12px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>

</div>

// ── STATE ────────────────────────────────────────────────────────────────────
let selectedTeam = null;
let pickCount = 0;

// ── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  buildTeamGrid();
  addPickRow();
  addPickRow();
  addPickRow();
}

function buildTeamGrid() {
  const grid = document.getElementById('teamGrid');
  NHL_TEAMS.forEach(team => {
    const btn = document.createElement('button');
    btn.className = 'team-btn';
    btn.textContent = team;
    btn.onclick = () => selectTeam(team, btn);
    grid.appendChild(btn);
  });
}

function selectTeam(team, btn) {
  selectedTeam = team;
  document.querySelectorAll('.team-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function addPickRow() {
  pickCount++;
  const id = pickCount;
  const row = document.createElement('div');
  row.className = 'pick-row';
  row.id = `pick-${id}`;

  const prospectNames = Object.keys(PROSPECTS);
  const options = prospectNames.map(n => `<option value="${n}">${n}</option>`).join('');

  row.innerHTML = `
    <select class="round-select">
      <option value="1">Round 1</option>
      <option value="2">Round 2</option>
      <option value="3">Round 3</option>
      <option value="4">Round 4</option>
      <option value="5">Round 5</option>
      <option value="6">Round 6</option>
      <option value="7">Round 7</option>
    </select>
    <select class="player-input">
      <option value="">— Select Prospect —</option>
      ${options}
    </select>
    <select class="position-select">
      <option value="">Position</option>
      <option value="C">Centre</option>
      <option value="LW">Left Wing</option>
      <option value="RW">Right Wing</option>
      <option value="D">Defenceman</option>
      <option value="G">Goalie</option>
    </select>
    <button class="remove-btn" onclick="removePick(${id})">✕</button>
  `;

  document.getElementById('pickRows').appendChild(row);
}

function removePick(id) {
  const row = document.getElementById(`pick-${id}`);
  if (row) row.remove();
}

// ── GRADING LOGIC ────────────────────────────────────────────────────────────

function getPickGrade(prospectName, round) {
  const p = PROSPECTS[prospectName];
  if (!p) return null;

  // Base score from prospect quality
  let score = (
    p.scores.production * 0.30 +
    p.scores.skating * 0.20 +
    p.scores.hockey_iq * 0.25 +
    p.scores.compete * 0.15 +
    p.scores.ceiling * 0.10
  );

  // Round context: was this a reach or a steal?
  const expectedRound = Math.ceil((p.rank / 32) * 7);
  const roundDiff = round - expectedRound;

  let roundBonus = 0;
  let roundVerdict = '';
  if (roundDiff >= 2) {
    roundBonus = 12;
    roundVerdict = `Exceptional value — ${prospectName} was available ${roundDiff} round(s) later than expected.`;
  } else if (roundDiff === 1) {
    roundBonus = 6;
    roundVerdict = `Good value pick — slightly later than their consensus ranking.`;
  } else if (roundDiff === 0) {
    roundBonus = 0;
    roundVerdict = `Picked right on consensus — exactly where most boards had them.`;
  } else if (roundDiff === -1) {
    roundBonus = -8;
    roundVerdict = `Slight reach — taken one round earlier than most boards projected.`;
  } else {
    roundBonus = -18;
    roundVerdict = `Significant reach — taken ${Math.abs(roundDiff)} rounds earlier than projected. Hard to justify unless your scouts know something others don't.`;
  }

  score = Math.min(100, Math.max(0, score + roundBonus));

  // Letter grade
  let grade, gradeClass;
  if (score >= 90) { grade = 'A+'; gradeClass = 'grade-A'; }
  else if (score >= 82) { grade = 'A'; gradeClass = 'grade-A'; }
  else if (score >= 75) { grade = 'A-'; gradeClass = 'grade-A'; }
  else if (score >= 68) { grade = 'B+'; gradeClass = 'grade-B'; }
  else if (score >= 62) { grade = 'B'; gradeClass = 'grade-B'; }
  else if (score >= 55) { grade = 'B-'; gradeClass = 'grade-B'; }
  else if (score >= 48) { grade = 'C+'; gradeClass = 'grade-C'; }
  else if (score >= 40) { grade = 'C'; gradeClass = 'grade-C'; }
  else if (score >= 32) { grade = 'D'; gradeClass = 'grade-D'; }
  else { grade = 'F'; gradeClass = 'grade-F'; }

  return { score: Math.round(score), grade, gradeClass, roundVerdict, prospect: p };
}

function getBarColor(value) {
  if (value >= 85) return 'var(--green)';
  if (value >= 70) return '#86EFAC';
  if (value >= 55) return 'var(--yellow)';
  if (value >= 40) return 'var(--orange)';
  return 'var(--red)';
}

function gradeDraft() {
  if (!selectedTeam) {
    alert('Please select your team first.');
    return;
  }

  const rows = document.querySelectorAll('.pick-row');
  const picks = [];

  rows.forEach(row => {
    const round = parseInt(row.querySelector('.round-select').value);
    const player = row.querySelector('.player-input').value;
    if (player && player !== '') {
      picks.push({ round, player });
    }
  });

  if (picks.length === 0) {
    alert('Please add at least one pick.');
    return;
  }

  // Calculate results
  const results = picks.map(p => ({
    ...p,
    result: getPickGrade(p.player, p.round)
  })).filter(p => p.result);

  if (results.length === 0) return;

  const avgScore = Math.round(results.reduce((s, r) => s + r.result.score, 0) / results.length);
  let overallGrade, overallClass;
  if (avgScore >= 88) { overallGrade = 'A+'; overallClass = 'grade-A'; }
  else if (avgScore >= 80) { overallGrade = 'A'; overallClass = 'grade-A'; }
  else if (avgScore >= 73) { overallGrade = 'A-'; overallClass = 'grade-A'; }
  else if (avgScore >= 66) { overallGrade = 'B+'; overallClass = 'grade-B'; }
  else if (avgScore >= 60) { overallGrade = 'B'; overallClass = 'grade-B'; }
  else if (avgScore >= 53) { overallGrade = 'B-'; overallClass = 'grade-B'; }
  else if (avgScore >= 45) { overallGrade = 'C'; overallClass = 'grade-C'; }
  else if (avgScore >= 35) { overallGrade = 'D'; overallClass = 'grade-D'; }
  else { overallGrade = 'F'; overallClass = 'grade-F'; }

  const summaries = {
    'A+': 'Outstanding draft. Your scouts were locked in — value at every pick, no questionable reaches.',
    'A': 'Excellent draft. Strong selections throughout. A few picks that will look very smart in hindsight.',
    'A-': 'Very good draft with a couple minor quibbles. Overall a strong class that should develop well.',
    'B+': 'Solid draft. Good foundational picks with some upside. A couple choices raise eyebrows.',
    'B': 'Decent draft. More hits than misses, but a few picks leave value on the board.',
    'B-': 'Average to slightly above. Some bright spots but also a notable reach or two.',
    'C': 'Middling draft. The value wasn\'t maximized, and some picks look like fits rather than best available.',
    'D': 'Tough draft. Several reaches and questionable fits will be hard to justify come opening night.',
    'F': 'Difficult to defend. Significant reaches throughout suggest the scouts were off their game.',
  };

  renderResults(selectedTeam, overallGrade, overallClass, avgScore, summaries[overallGrade] || '', results);
}

function renderResults(team, grade, gradeClass, score, summary, results) {
  const container = document.getElementById('results');
  container.className = 'results visible';

  let html = `
    <div class="section-label">Draft Results — ${team}</div>
    <div class="overall-card">
      <div class="grade-circle ${gradeClass}">${grade}</div>
      <div class="overall-info">
        <div class="overall-team">${team.toUpperCase()} DRAFT CLASS</div>
        <div class="overall-summary">${summary}</div>
      </div>
      <div class="overall-score">
        <div class="score-num">${score}</div>
        <div class="score-label">Draft Score</div>
      </div>
    </div>
  `;

  results.forEach((pick, i) => {
    const { result, player, round } = pick;
    const p = result.prospect;
    const bars = Object.entries(p.scores);
    const delay = i * 0.1;

    html += `
      <div class="pick-result" style="animation-delay: ${delay}s">
        <div class="pick-result-header">
          <div>
            <div class="pick-meta">
              <span class="round-badge">Round ${round}</span>
              <span class="round-badge" style="background: rgba(255,255,255,0.04); color: var(--text-muted); border: 1px solid var(--border);">#${p.rank} Overall Rank</span>
            </div>
            <div class="pick-name" style="margin-top: 8px;">${player}</div>
            <div class="pick-details">${p.pos} · ${p.league} · ${p.nation}</div>
          </div>
          <div class="pick-grade-badge ${result.gradeClass}">${result.grade}</div>
        </div>

        <div class="stat-bars">
          ${bars.map(([key, val]) => `
            <div class="stat-bar-item" data-val="${val}">
              <div class="stat-bar-label">
                <span class="stat-bar-name">${key.replace('_', ' ')}</span>
                <span class="stat-bar-value" style="color: ${getBarColor(val)}">${val}</span>
              </div>
              <div class="bar-track">
                <div class="bar-fill" style="background: ${getBarColor(val)}; width: 0%" data-target="${val}"></div>
              </div>
            </div>
          `).join('')}
        </div>

        <div class="pick-verdict">
          <strong style="color: var(--text-dim);">Scouting Report:</strong> ${p.verdict}
          <br><br>
          <strong style="color: var(--text-dim);">Value Assessment:</strong> ${result.roundVerdict}
          <br>
          ${p.comps.map(c => `<span class="comp-tag">Comp: <span>${c}</span></span>`).join('')}
        </div>
      </div>
    `;
  });

  container.innerHTML = html;

  // Animate bars after render
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.target + '%';
    });
  }, 100);

  container.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

init();
</script>
