<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Board — 2026 NHL Draft Grader</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0D0F12;
  --surface: #13161A;
  --surface2: #1A1E24;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --gold: #D4AF37;
  --gold-dim: rgba(212,175,55,0.15);
  --gold-glow: rgba(212,175,55,0.08);
  --text: #F0F2F5;
  --text-muted: #6B7280;
  --text-dim: #9CA3AF;
  --green: #22C55E;
  --yellow: #EAB308;
  --orange: #F97316;
  --red: #EF4444;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(212,175,55,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.wrapper {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

header {
  padding: 48px 0 40px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  margin-bottom: 48px;
}

.logo-mark {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  letter-spacing: 0.08em;
  line-height: 1;
}
.logo-mark span { color: var(--gold); }
.logo-sub {
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  margin-top: 4px;
}

.draft-year {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.15em;
  color: var(--gold);
  text-align: right;
}
.draft-label {
  font-size: 0.68rem;
  color: var(--text-muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 2px;
  text-align: right;
}

.section-label {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 12px;
  font-weight: 600;
}

.team-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
  margin-bottom: 40px;
}

.team-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 12px;
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: center;
}
.team-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
.team-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-glow); }

.pick-builder {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px;
  margin-bottom: 32px;
}
.pick-builder h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: 0.1em;
  margin-bottom: 20px;
}

.pick-row {
  display: grid;
  grid-template-columns: 100px 1fr 120px auto;
  gap: 12px;
  align-items: center;
  margin-bottom: 12px;
}

.pick-row select, .pick-row input {
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
  appearance: none;
  -webkit-appearance: none;
}
.pick-row select:focus, .pick-row input:focus { border-color: var(--gold); }
.pick-row input::placeholder { color: var(--text-muted); }
.pick-row select option { background: var(--bg); }

.remove-btn {
  background: none;
  border: 1px solid rgba(239,68,68,0.2);
  color: rgba(239,68,68,0.5);
  width: 36px;
  height: 36px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1rem;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.remove-btn:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.08); }

.add-pick-btn {
  background: none;
  border: 1px dashed var(--border2);
  color: var(--text-muted);
  padding: 10px 20px;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
  letter-spacing: 0.05em;
}
.add-pick-btn:hover { border-color: var(--gold); color: var(--gold); }

.grade-btn {
  display: block;
  width: 100%;
  background: var(--gold);
  color: var(--bg);
  border: none;
  padding: 16px;
  border-radius: 8px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.15em;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-top: 20px;
}
.grade-btn:hover { background: #E8C84A; transform: translateY(-1px); }

.results { display: none; }
.results.visible { display: block; animation: fadeUp 0.5s ease both; }

.overall-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 32px;
}

.grade-circle {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  letter-spacing: 0.05em;
  border: 2px solid;
}

.grade-A { color: var(--green); border-color: var(--green); background: rgba(34,197,94,0.08); }
.grade-B { color: #86EFAC; border-color: #86EFAC; background: rgba(134,239,172,0.08); }
.grade-C { color: var(--yellow); border-color: var(--yellow); background: rgba(234,179,8,0.08); }
.grade-D { color: var(--orange); border-color: var(--orange); background: rgba(249,115,22,0.08); }
.grade-F { color: var(--red); border-color: var(--red); background: rgba(239,68,68,0.08); }

.overall-info { flex: 1; }
.overall-team { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.08em; margin-bottom: 6px; }
.overall-summary { font-size: 0.9rem; color: var(--text-dim); line-height: 1.6; max-width: 500px; }
.overall-score { text-align: right; flex-shrink: 0; }
.score-num { font-family: 'DM Mono', monospace; font-size: 2rem; font-weight: 500; color: var(--gold); line-height: 1; }
.score-label { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 4px; }

.pick-result {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 16px;
  animation: fadeUp 0.4s ease both;
}

.pick-result-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 16px;
}

.pick-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

.round-badge {
  background: var(--gold-dim);
  color: var(--gold);
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.pick-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.05em; margin-top: 8px; }
.pick-details { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

.pick-grade-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 0.05em;
  padding: 6px 16px;
  border-radius: 8px;
  border: 1.5px solid;
  flex-shrink: 0;
}

.stat-bars { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; margin-bottom: 16px; }
.stat-bar-item { display: flex; flex-direction: column; gap: 6px; }
.stat-bar-label { display: flex; justify-content: space-between; align-items: center; }
.stat-bar-name { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; }
.stat-bar-value { font-family: 'DM Mono', monospace; font-size: 0.75rem; font-weight: 500; }
.bar-track { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; transition: width 1s cubic-bezier(0.4,0,0.2,1); width: 0%; }

.pick-verdict {
  font-size: 0.82rem;
  color: var(--text-dim);
  line-height: 1.6;
  padding-top: 16px;
  border-top: 1px solid var(--border);

.comp-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text-dim);
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 0.72rem;
  margin-top: 8px;
  margin-right: 6px;

.comp-tag span { color: var(--gold); font-weight: 600; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
  .pick-row { grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; }
  .stat-bars { grid-template-columns: 1fr; }
  .overall-card { flex-direction: column; gap: 20px; }
  .overall-score { text-align: left; }
  header { flex-direction: column; align-items: flex-start; gap: 12px; }
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>

// ── STATE ────────────────────────────────────────────────────────────────────
let selectedTeam = null;
let pickCount = 0;

function init() {
  buildTeamGrid();
  addPickRow();
  addPickRow();
  addPickRow();
}

function buildTeamGrid() {
  const grid = document.getElementById('teamGrid');
  NHL_TEAMS.forEach(team => {
    const btn = document.createElement('button');
    btn.className = 'team-btn';
    btn.textContent = team;
    btn.onclick = () => selectTeam(team, btn);
    grid.appendChild(btn);
  });
}

function selectTeam(team, btn) {
  selectedTeam = team;
  document.querySelectorAll('.team-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function addPickRow() {
  pickCount++;
  const id = pickCount;
  const row = document.createElement('div');
  row.className = 'pick-row';
  row.id = `pick-${id}`;
  const options = Object.keys(PROSPECTS).map(n => `<option value="${n}">${n}</option>`).join('');
  row.innerHTML = `
    <select class="round-select">
      <option value="1">Round 1</option>
      <option value="2">Round 2</option>
      <option value="3">Round 3</option>
      <option value="4">Round 4</option>
      <option value="5">Round 5</option>
      <option value="6">Round 6</option>
      <option value="7">Round 7</option>
    </select>
    <select class="player-input">
      <option value="">— Select Prospect —</option>
      ${options}
    </select>
    <select class="position-select">
      <option value="">Position</option>
      <option value="C">Centre</option>
      <option value="LW">Left Wing</option>
      <option value="RW">Right Wing</option>
      <option value="D">Defenceman</option>
      <option value="G">Goalie</option>
    </select>
    <button class="remove-btn" onclick="removePick(${id})">✕</button>
  `;
  document.getElementById('pickRows').appendChild(row);
}

function removePick(id) {
  const row = document.getElementById(`pick-${id}`);
  if (row) row.remove();
}

function getBarColor(v) {
  if (v >= 85) return 'var(--green)';
  if (v >= 70) return '#86EFAC';
  if (v >= 55) return 'var(--yellow)';
  if (v >= 40) return 'var(--orange)';
  return 'var(--red)';
}

function getPickGrade(name, round) {
  const p = PROSPECTS[name];
  if (!p) return null;
  let score = p.scores.production*0.30 + p.scores.skating*0.20 + p.scores.hockey_iq*0.25 + p.scores.compete*0.15 + p.scores.ceiling*0.10;
  const expectedRound = p.rank <= 32 ? 1 : p.rank <= 64 ? 2 : 3;
  const diff = round - expectedRound;
  let roundBonus = 0, roundVerdict = '';
  if (diff >= 2)      { roundBonus = 12; roundVerdict = `Exceptional value — available ${diff} round(s) later than expected.`; }
  else if (diff === 1){ roundBonus = 6;  roundVerdict = `Good value — slightly later than their consensus ranking.`; }
  else if (diff === 0){ roundBonus = 0;  roundVerdict = `Picked right on consensus — exactly where most boards had them.`; }
  else if (diff === -1){ roundBonus = -8; roundVerdict = `Slight reach — one round earlier than most boards projected.`; }
  else                { roundBonus = -18; roundVerdict = `Significant reach — ${Math.abs(diff)} rounds earlier than projected.`; }
  score = Math.min(100, Math.max(0, score + roundBonus));
  let grade, gradeClass;
  if (score >= 90)      { grade = 'A+'; gradeClass = 'grade-A'; }
  else if (score >= 82) { grade = 'A';  gradeClass = 'grade-A'; }
  else if (score >= 75) { grade = 'A-'; gradeClass = 'grade-A'; }
  else if (score >= 68) { grade = 'B+'; gradeClass = 'grade-B'; }
  else if (score >= 62) { grade = 'B';  gradeClass = 'grade-B'; }
  else if (score >= 55) { grade = 'B-'; gradeClass = 'grade-B'; }
  else if (score >= 48) { grade = 'C+'; gradeClass = 'grade-C'; }
  else if (score >= 40) { grade = 'C';  gradeClass = 'grade-C'; }
  else if (score >= 32) { grade = 'D';  gradeClass = 'grade-D'; }
  else                  { grade = 'F';  gradeClass = 'grade-F'; }
  return { score: Math.round(score), grade, gradeClass, roundVerdict, prospect: p };
}

function gradeDraft() {
  if (!selectedTeam) { alert('Please select your team first.'); return; }
  const rows = document.querySelectorAll('.pick-row');
  const picks = [];
  rows.forEach(row => {
    const round = parseInt(row.querySelector('.round-select').value);
    const player = row.querySelector('.player-input').value;
    if (player) picks.push({ round, player });
  });
  if (!picks.length) { alert('Please add at least one pick.'); return; }
  const results = picks.map(p => ({ ...p, result: getPickGrade(p.player, p.round) })).filter(p => p.result);
  if (!results.length) return;
  const avg = Math.round(results.reduce((s,r) => s + r.result.score, 0) / results.length);
  let og, oc;
  if (avg >= 88)      { og='A+'; oc='grade-A'; }
  else if (avg >= 80) { og='A';  oc='grade-A'; }
  else if (avg >= 73) { og='A-'; oc='grade-A'; }
  else if (avg >= 66) { og='B+'; oc='grade-B'; }
  else if (avg >= 60) { og='B';  oc='grade-B'; }
  else if (avg >= 53) { og='B-'; oc='grade-B'; }
  else if (avg >= 45) { og='C';  oc='grade-C'; }
  else if (avg >= 35) { og='D';  oc='grade-D'; }
  else                { og='F';  oc='grade-F'; }
  const summaries = {
    'A+':'Outstanding draft. Your scouts were locked in — elite value at every pick.',
    'A':'Excellent draft. Strong selections throughout with smart value picks.',
    'A-':'Very good draft. A couple minor quibbles but a strong class overall.',
    'B+':'Solid draft. Good picks with upside. A couple choices raise minor eyebrows.',
    'B':'Decent draft. More hits than misses, but a few picks left value on the board.',
    'B-':'Above average. Some bright spots but also a notable reach or two.',
    'C':'Middling draft. Value wasn\'t maximized and some picks feel like fits over best available.',
    'D':'Tough draft. Several reaches that will be hard to justify come opening night.',
    'F':'Difficult to defend. Significant reaches throughout.'
  };
  renderResults(selectedTeam, og, oc, avg, summaries[og]||'', results);
}

function renderResults(team, grade, gradeClass, score, summary, results) {
  const container = document.getElementById('results');
  container.className = 'results visible';
  let html = `
    <div class="section-label">Draft Results — ${team}</div>
    <div class="overall-card">
      <div class="grade-circle ${gradeClass}">${grade}</div>
      <div class="overall-info">
        <div class="overall-team">${team.toUpperCase()} DRAFT CLASS</div>
        <div class="overall-summary">${summary}</div>
      </div>
      <div class="overall-score">
        <div class="score-num">${score}</div>
        <div class="score-label">Draft Score</div>
      </div>
    </div>
  `;
  results.forEach((pick, i) => {
    const { result, player, round } = pick;
    const p = result.prospect;
    html += `
      <div class="pick-result" style="animation-delay:${i*0.1}s">
        <div class="pick-result-header">
          <div>
            <div class="pick-meta">
              <span class="round-badge">Round ${round}</span>
              <span class="round-badge" style="background:rgba(255,255,255,0.04);color:var(--text-muted);border:1px solid var(--border);">#${p.rank} Overall</span>
            </div>
            <div class="pick-name">${player}</div>
            <div class="pick-details">${p.pos} · ${p.league} · ${p.nation}</div>
          </div>
          <div class="pick-grade-badge ${result.gradeClass}">${result.grade}</div>
        </div>
        <div class="stat-bars">
          ${Object.entries(p.scores).map(([k,v]) => `
            <div class="stat-bar-item">
              <div class="stat-bar-label">
                <span class="stat-bar-name">${k.replace('_',' ')}</span>
                <span class="stat-bar-value" style="color:${getBarColor(v)}">${v}</span>
              </div>
              <div class="bar-track"><div class="bar-fill" style="background:${getBarColor(v)}" data-target="${v}"></div></div>
            </div>
          `).join('')}
        </div>
        <div class="pick-verdict">
          <strong style="color:var(--text-dim)">Scouting Report:</strong> ${p.verdict}<br><br>
          <strong style="color:var(--text-dim)">Value Assessment:</strong> ${result.roundVerdict}<br>
          ${p.comps.map(c => `<span class="comp-tag">Comp: <span>${c}</span></span>`).join('')}
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(b => { b.style.width = b.dataset.target + '%'; });
  }, 100);
  container.scrollIntoView({ behavior:'smooth', block:'start' });
}

init();
</script>
</body>
</html>
