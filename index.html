<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade My Draft — 2026 NHL Draft Grader</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #FAF8F3; --surface: #FFFFFF; --surface2: #F3F0E8;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
  --gold: #B8860B; --gold-dim: rgba(184,134,11,0.1); --gold-glow: rgba(184,134,11,0.06);
  --text: #0C0C0C; --text-muted: #6B6B6B; --text-dim: #4A4A4A;
  --green: #16A34A; --yellow: #CA8A04; --orange: #EA580C; --red: #DC2626;
}
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(0,0,0,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.018) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
body::after { content:''; position:fixed; top:-200px; left:50%; transform:translateX(-50%); width:700px; height:400px; background:radial-gradient(ellipse,rgba(184,134,11,0.06) 0%,transparent 70%); pointer-events:none; z-index:0; }
.wrapper { position:relative; z-index:1; max-width:960px; margin:0 auto; padding:0 24px 80px; }
header { padding:48px 0 40px; display:flex; align-items:flex-end; justify-content:space-between; border-bottom:1px solid var(--border2); margin-bottom:48px; }
.logo-mark { font-family:'Bebas Neue',sans-serif; font-size:3rem; letter-spacing:0.08em; line-height:1; color:var(--text); }
.logo-mark span { color:var(--gold); }
.logo-sub { font-size:0.7rem; letter-spacing:0.2em; color:var(--text-muted); font-weight:500; text-transform:uppercase; margin-top:4px; }
.draft-year { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:0.15em; color:var(--gold); text-align:right; }
.draft-label { font-size:0.68rem; color:var(--text-muted); letter-spacing:0.15em; text-transform:uppercase; margin-top:2px; text-align:right; }
.section-label { font-size:0.65rem; letter-spacing:0.2em; color:var(--text-muted); text-transform:uppercase; margin-bottom:12px; font-weight:600; }
.team-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; margin-bottom:40px; }
.team-btn { background:var(--surface); border:1px solid var(--border2); color:var(--text-dim); padding:8px 12px; border-radius:6px; font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:500; cursor:pointer; transition:all 0.2s ease; text-align:center; }
.team-btn:hover { border-color:var(--gold); color:var(--text); background:var(--gold-glow); }
.team-btn.active { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }
.pick-builder { background:var(--surface); border:1px solid var(--border2); border-radius:12px; padding:28px; margin-bottom:32px; box-shadow:0 2px 12px rgba(0,0,0,0.04); }
.pick-builder h2 { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:0.1em; margin-bottom:20px; color:var(--text); }
.pick-row { display:grid; grid-template-columns:100px 1fr 120px auto; gap:12px; align-items:center; margin-bottom:12px; }
.pick-row select,.pick-row input { background:var(--bg); border:1px solid var(--border2); color:var(--text); padding:10px 14px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.85rem; outline:none; transition:border-color 0.2s; width:100%; appearance:none; -webkit-appearance:none; }
.pick-row select:focus,.pick-row input:focus { border-color:var(--gold); }
.remove-btn { background:none; border:1px solid rgba(220,38,38,0.2); color:rgba(220,38,38,0.5); width:36px; height:36px; border-radius:6px; cursor:pointer; font-size:1rem; transition:all 0.2s; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.remove-btn:hover { border-color:var(--red); color:var(--red); background:rgba(220,38,38,0.06); }
.add-pick-btn { background:none; border:1px dashed var(--border2); color:var(--text-muted); padding:10px 20px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.82rem; cursor:pointer; transition:all 0.2s; margin-top:4px; }
.add-pick-btn:hover { border-color:var(--gold); color:var(--gold); }
.grade-btn { display:block; width:100%; background:var(--text); color:var(--bg); border:none; padding:16px; border-radius:8px; font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:0.15em; cursor:pointer; transition:all 0.2s; margin-top:20px; }
.grade-btn:hover { background:#2A2A2A; transform:translateY(-1px); }
.results { display:none; }
.results.visible { display:block; animation:fadeUp 0.5s ease both; }
.overall-card { background:var(--surface); border:1px solid var(--border2); border-radius:12px; padding:32px; margin-bottom:24px; display:flex; align-items:center; gap:32px; box-shadow:0 2px 12px rgba(0,0,0,0.05); }
.grade-circle { width:100px; height:100px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-family:'Bebas Neue',sans-serif; font-size:2.8rem; letter-spacing:0.05em; border:2px solid; }
.grade-A { color:var(--green); border-color:var(--green); background:rgba(22,163,74,0.07); }
.grade-B { color:#15803D; border-color:#15803D; background:rgba(21,128,61,0.07); }
.grade-C { color:var(--yellow); border-color:var(--yellow); background:rgba(202,138,4,0.07); }
.grade-D { color:var(--orange); border-color:var(--orange); background:rgba(234,88,12,0.07); }
.grade-F { color:var(--red); border-color:var(--red); background:rgba(220,38,38,0.07); }
.overall-info { flex:1; }
.overall-team { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:0.08em; color:var(--text); margin-bottom:6px; }
.overall-summary { font-size:0.9rem; color:var(--text-dim); line-height:1.6; max-width:500px; }
.overall-score { text-align:right; flex-shrink:0; }
.score-num { font-family:'DM Mono',monospace; font-size:2rem; font-weight:500; color:var(--gold); line-height:1; }
.score-label { font-size:0.65rem; color:var(--text-muted); letter-spacing:0.15em; text-transform:uppercase; margin-top:4px; }
.pick-result { background:var(--surface); border:1px solid var(--border2); border-radius:12px; padding:24px; margin-bottom:16px; animation:fadeUp 0.4s ease both; box-shadow:0 1px 8px rgba(0,0,0,0.04); }
.pick-result-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:20px; gap:16px; }
.pick-meta { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.round-badge { background:var(--gold-dim); color:var(--gold); padding:3px 10px; border-radius:4px; font-size:0.68rem; font-weight:600; letter-spacing:0.15em; text-transform:uppercase; }
.rank-badge { background:var(--surface2); color:var(--text-muted); border:1px solid var(--border2); padding:3px 10px; border-radius:4px; font-size:0.68rem; font-weight:600; letter-spacing:0.1em; }
.pick-name { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:0.05em; color:var(--text); margin-top:8px; }
.pick-details { font-size:0.78rem; color:var(--text-muted); margin-top:2px; }
.pick-grade-badge { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:0.05em; padding:6px 16px; border-radius:8px; border:1.5px solid; flex-shrink:0; }
.stat-bars { display:grid; grid-template-columns:1fr 1fr; gap:12px 24px; margin-bottom:16px; }
.stat-bar-item { display:flex; flex-direction:column; gap:6px; }
.stat-bar-label { display:flex; justify-content:space-between; align-items:center; }
.stat-bar-name { font-size:0.7rem; color:var(--text-muted); letter-spacing:0.1em; text-transform:uppercase; font-weight:500; }
.stat-bar-value { font-family:'DM Mono',monospace; font-size:0.75rem; font-weight:500; }
.bar-track { height:4px; background:var(--surface2); border-radius:2px; overflow:hidden; }
.bar-fill { height:100%; border-radius:2px; transition:width 1s cubic-bezier(0.4,0,0.2,1); width:0%; }
.pick-verdict { font-size:0.82rem; color:var(--text-dim); line-height:1.6; padding-top:16px; border-top:1px solid var(--border); }
.comp-tag { display:inline-flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border2); color:var(--text-dim); padding:4px 10px; border-radius:4px; font-size:0.72rem; margin-top:8px; margin-right:6px; }
.comp-tag span { color:var(--gold); font-weight:600; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@media(max-width:600px){
  .pick-row{grid-template-columns:1fr 1fr;grid-template-rows:auto auto}
  .stat-bars{grid-template-columns:1fr}
  .overall-card{flex-direction:column;gap:20px}
  .overall-score{text-align:left}
  header{flex-direction:column;align-items:flex-start;gap:12px}
}
</style>
</head>

async function fetchNHLRoster(team) {
  if (ROSTER_CACHE[team]) return ROSTER_CACHE[team];
  const abbrev = TEAM_ABBREVS[team];
  if (!abbrev) return FALLBACK_ROSTERS[team] || null;
  try {
    const res = await fetch(`https://api-web.nhle.com/v1/roster/${abbrev}/20252026`);
    if (!res.ok) throw new Error('API failed');
    const data = await res.json();
    const roster = { C:[], LW:[], RW:[], LD:[], RD:[], G:[] };
    (data.forwards||[]).forEach(p => {
      const name = p.firstName.default + ' ' + p.lastName.default;
      const pos = p.positionCode;
      if (pos==='C') roster.C.push(name);
      else if (pos==='L') roster.LW.push(name);
      else if (pos==='R') roster.RW.push(name);
    });
    (data.defensemen||[]).forEach(p => {
      const name = p.firstName.default + ' ' + p.lastName.default;
      if (p.shootsCatches==='L') roster.LD.push(name);
      else roster.RD.push(name);
    });
    (data.goalies||[]).forEach(p => {
      roster.G.push(p.firstName.default + ' ' + p.lastName.default);
    });
    ROSTER_CACHE[team] = roster;
    return roster;
  } catch(e) {
    // API blocked — use fallback
    const fallback = FALLBACK_ROSTERS[team] || null;
    if (fallback) ROSTER_CACHE[team] = fallback;
    return fallback;
  }
}

function getDevTimeline(prospect) {
  const p = prospect;
  const readiness = (p.scores.production + p.scores.compete + p.scores.hockey_iq) / 3;
  const league = p.league || '';
  let baseYears = 2;
  if (league.includes('SHL') || league.includes('Liiga') || league.includes('SM-sarja') || league.includes('Extraliga') || league.includes('NCAA')) baseYears = 1;
  else if (league.includes('OHL') || league.includes('WHL') || league.includes('QMJHL')) baseYears = 2;
  else if (league.includes('MHL') || league.includes('U20') || league.includes('NTDP') || league.includes('USHL') || league.includes('Division')) baseYears = 3;
  if (readiness >= 88) baseYears = Math.max(0, baseYears - 1);
  else if (readiness < 70) baseYears += 1;
  if (p.rank <= 5) baseYears = Math.max(1, baseYears);
  baseYears = Math.min(4, Math.max(0, baseYears));
  const labels = ['NHL-Ready (0-1 yrs)','1-2 Years','2-3 Years','3-4 Years','4+ Years'];
  const colors = ['#16A34A','#86EFAC','#EAB308','#F97316','#EF4444'];
  return { years: baseYears, label: labels[baseYears], color: colors[baseYears] };
}

// Map prospect pos string to canonical positions, priority ordered
function getProspectPositions(pos) {
  const map = {
    'C':['C'],'LW':['LW'],'RW':['RW'],
    'LW/RW':['LW','RW'],'RW/LW':['RW','LW'],
    'C/LW':['C','LW'],'C/RW':['C','RW'],
    'C/LW/RW':['C','LW','RW'],
    'LD':['LD'],'RD':['RD'],
    'LD/RD':['LD','RD'],'RD/LD':['RD','LD'],
    'F':['C','LW','RW'],'G':['G'],
  };
  return map[pos] || ['C'];
}

async function buildRosterDiagram(team, picks) {
  const container = document.getElementById('rosterDiagram');
  if (!container) return;
  container.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:0.85rem;">Loading roster from NHL API...</div>';

  const apiRoster = await fetchNHLRoster(team);

  // Build display roster: 4 lines of C/LW/RW, 3 D pairs LD/RD, 2 G
  // Fill from API data, pad with '?'
  const pad = (arr, n) => { const a=[...arr]; while(a.length<n) a.push('?'); return a.slice(0,n); };
  const displayRoster = {
    C:  pad(apiRoster ? apiRoster.C  : [], 4),
    LW: pad(apiRoster ? apiRoster.LW : [], 4),
    RW: pad(apiRoster ? apiRoster.RW : [], 4),
    LD: pad(apiRoster ? apiRoster.LD : [], 3),
    RD: pad(apiRoster ? apiRoster.RD : [], 3),
    G:  pad(apiRoster ? apiRoster.G  : [], 2),
  };

  // Place draft picks — match to exact position, respect priority order
  const draftedSlots = {}; // "C-0", "LW-2", etc.
  picks.forEach(pick => {
    const p = pick.result.prospect;
    const positions = getProspectPositions(p.pos);
    const dev = getDevTimeline(p);
    for (const pos of positions) {
      const arr = displayRoster[pos];
      if (!arr) continue;
      const idx = arr.indexOf('?');
      if (idx !== -1) {
        arr[idx] = pick.player;
        draftedSlots[pos+'-'+idx] = { name: pick.player, dev };
        break;
      }
    }
  });

  const playerCard = (name, key) => {
    const isDrafted = draftedSlots[key];
    const isEmpty = name === '?';
    let bg, border, textColor, badge = '';
    const pos = key.split('-')[0];
    if (isDrafted) {
      bg = isDrafted.dev.color+'18';
      border = '2px solid '+isDrafted.dev.color;
      textColor = 'var(--text)';
      badge = `<div style="font-size:0.58rem;color:${isDrafted.dev.color};font-weight:700;letter-spacing:0.06em;margin-top:2px;">${isDrafted.dev.label}</div>`;
    } else if (isEmpty) {
      bg = 'rgba(0,0,0,0.02)';
      border = '1.5px dashed rgba(0,0,0,0.12)';
      textColor = 'var(--text-muted)';
    } else {
      bg = 'var(--surface2)';
      border = '1px solid var(--border2)';
      textColor = 'var(--text-dim)';
    }

    </div>

    html += `<div style="margin-bottom:8px;">
      <div style="font-size:0.58rem;color:var(--text-muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:4px;font-weight:600;">${lineLabels[i]}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
        ${playerCard(displayRoster.C[i], 'C-'+i)}
        ${playerCard(displayRoster.LW[i],'LW-'+i)}
        ${playerCard(displayRoster.RW[i],'RW-'+i)}
      </div></div>`;
  }

  // 3 D pairs
  html += `<div style="margin-top:12px;margin-bottom:8px;">
    <div style="font-size:0.58rem;color:var(--text-muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:4px;font-weight:600;">Defence</div>
    ${[0,1,2].map(i=>`<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;">
      ${playerCard(displayRoster.LD[i],'LD-'+i)}
      ${playerCard(displayRoster.RD[i],'RD-'+i)}
    </div>`).join('')}
  </div>`;

  // Goalies
  html += `<div>
    <div style="font-size:0.58rem;color:var(--text-muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:4px;font-weight:600;">Goalies</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
      ${playerCard(displayRoster.G[0],'G-0')}
      ${playerCard(displayRoster.G[1],'G-1')}

  </div>`;

  // Legend
  html += `<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);display:flex;gap:16px;flex-wrap:wrap;align-items:center;">

    ${['#16A34A','#86EFAC','#EAB308','#F97316','#EF4444'].map((col,i)=>{
      const labs=['NHL-Ready','1-2 Yrs','2-3 Yrs','3-4 Yrs','4+ Yrs'];
      return `<div style="display:flex;align-items:center;gap:5px;"><div style="width:10px;height:10px;border-radius:50%;background:${col};flex-shrink:0;"></div><span style="font-size:0.68rem;color:var(--text-dim);">${labs[i]}</span></div>`;
    }).join('')}
  </div></div>`;

  container.innerHTML = html;
}

function getDevTimeline(prospect) {
  const p = prospect;
  const readiness = (p.scores.production + p.scores.compete + p.scores.hockey_iq) / 3;
  const league = p.league || '';
  let baseYears = 2;
  if (league.includes('SHL') || league.includes('Liiga') || league.includes('SM-sarja') || league.includes('Extraliga') || league.includes('NCAA')) baseYears = 1;
  else if (league.includes('OHL') || league.includes('WHL') || league.includes('QMJHL')) baseYears = 2;
  else if (league.includes('MHL') || league.includes('U20') || league.includes('NTDP') || league.includes('USHL') || league.includes('Division')) baseYears = 3;
  if (readiness >= 88) baseYears = Math.max(0, baseYears - 1);
  else if (readiness < 70) baseYears += 1;
  if (p.rank <= 5) baseYears = Math.max(1, baseYears);
  baseYears = Math.min(4, Math.max(0, baseYears));
  const labels = ['NHL-Ready (0-1 yrs)','1-2 Years','2-3 Years','3-4 Years','4+ Years'];
  const colors = ['#16A34A','#86EFAC','#EAB308','#F97316','#EF4444'];
  return { years: baseYears, label: labels[baseYears], color: colors[baseYears] };
}

// Team fit bonus calculation
function getTeamFitBonus(prospectPos, team) {
  const tn = TEAM_NEEDS[team];
  if (!tn) return { bonus: 0, label: '', note: '' };

  const positions = getProspectPositions(prospectPos);
  let maxNeed = 0;
  let bestPos = '';
  positions.forEach(p => {
    const need = tn.needs[p] || 1;
    if (need > maxNeed) { maxNeed = need; bestPos = p; }
  });

  // Status modifier — rebuilding teams value ceiling, contenders value floor/readiness
  let statusBonus = 0;
  if (tn.status === 'rebuilding') statusBonus = 2;
  else if (tn.status === 'transitioning') statusBonus = 1;
  else statusBonus = 0;

  let bonus = 0, label = '', note = '';
  if (maxNeed === 3) {
    bonus = 10 + statusBonus;
    label = '🔥 High Need';
    note = `${team} desperately needs a ${bestPos}. This is a priority position.`;
  } else if (maxNeed === 2) {
    bonus = 4 + statusBonus;
    label = '✓ Good Fit';
    note = `${team} has moderate need at ${bestPos}. Solid positional fit.`;
  } else {
    bonus = -3;
    label = '⚠ Low Need';
    note = `${team} has depth at ${bestPos} already. Better value elsewhere.`;
  }

  return { bonus, label, note, status: tn.status, teamNote: tn.note };
}

function getBarColor(v){if(v>=85)return'#16A34A';if(v>=70)return'#15803D';if(v>=55)return'#CA8A04';if(v>=40)return'#EA580C';return'#DC2626';}
function getPickGrade(name,round){const p=PROSPECTS[name];if(!p)return null;let score=p.scores.production*0.30+p.scores.skating*0.20+p.scores.hockey_iq*0.25+p.scores.compete*0.15+p.scores.ceiling*0.10;const er=p.rank<=32?1:p.rank<=64?2:3;const diff=round-er;let bonus=0,rv='';if(diff>=2){bonus=12;rv=`Exceptional value — available ${diff} round(s) later than expected.`;}else if(diff===1){bonus=6;rv='Good value — slightly later than their consensus ranking.';}else if(diff===0){bonus=0;rv='Picked right on consensus — exactly where most boards have them.';}else if(diff===-1){bonus=-8;rv='Slight reach — one round earlier than most boards projected.';}else{bonus=-18;rv=`Significant reach — ${Math.abs(diff)} rounds earlier than projected.`;}

// Team fit
const fit = selectedTeam ? getTeamFitBonus(p.pos, selectedTeam) : {bonus:0,label:'',note:'',status:'',teamNote:''};
score = Math.min(100,Math.max(0,score+bonus+fit.bonus));

let grade,gc;if(score>=90){grade='A+';gc='grade-A';}else if(score>=82){grade='A';gc='grade-A';}else if(score>=75){grade='A-';gc='grade-A';}else if(score>=68){grade='B+';gc='grade-B';}else if(score>=62){grade='B';gc='grade-B';}else if(score>=55){grade='B-';gc='grade-B';}else if(score>=48){grade='C+';gc='grade-C';}else if(score>=40){grade='C';gc='grade-C';}else if(score>=32){grade='D';gc='grade-D';}else{grade='F';gc='grade-F';}return{score:Math.round(score),grade,gc,roundVerdict:rv,fit,prospect:p};}
function gradeDraft(){if(!selectedTeam){alert('Please select your team first.');return;}const picks=[];document.querySelectorAll('.pick-row').forEach(row=>{const round=parseInt(row.querySelector('.round-select').value);const player=row.querySelector('.player-input').value;if(player)picks.push({round,player});});if(!picks.length){alert('Please add at least one pick.');return;}const results=picks.map(p=>({...p,result:getPickGrade(p.player,p.round)})).filter(p=>p.result);if(!results.length)return;const avg=Math.round(results.reduce((s,r)=>s+r.result.score,0)/results.length);let og,oc;if(avg>=88){og='A+';oc='grade-A';}else if(avg>=80){og='A';oc='grade-A';}else if(avg>=73){og='A-';oc='grade-A';}else if(avg>=66){og='B+';oc='grade-B';}else if(avg>=60){og='B';oc='grade-B';}else if(avg>=53){og='B-';oc='grade-B';}else if(avg>=45){og='C';oc='grade-C';}else if(avg>=35){og='D';oc='grade-D';}else{og='F';oc='grade-F';}const s={'A+':'Outstanding draft. Elite value at every pick — scouts were locked in.','A':'Excellent draft. Strong selections throughout with smart value picks.','A-':'Very good draft with minor quibbles. A strong class that should develop well.','B+':'Solid draft with good picks. A couple choices raise minor eyebrows.','B':'Decent draft. More hits than misses but a few picks left value on the board.','B-':'Above average. Some bright spots but also a notable reach or two.','C':"Middling draft. Value wasn't maximized and some picks feel like fits over best available.",'D':'Tough draft. Several reaches that will be hard to justify come opening night.','F':'Difficult to defend. Significant reaches throughout suggest scouts were off.'};renderResults(selectedTeam,og,oc,avg,s[og]||'',results);}
function renderResults(team,grade,gc,score,summary,results){
const c=document.getElementById('results');c.className='results visible';
const tn=TEAM_NEEDS[team]||{};
const statusColors={rebuilding:'#EF4444',transitioning:'#EAB308',contending:'#16A34A'};
const statusLabels={rebuilding:'REBUILDING',transitioning:'TRANSITIONING',contending:'CONTENDING'};
const sc=statusColors[tn.status]||'#6B6B6B';
const sl=statusLabels[tn.status]||'';
let html=`
<div class="section-label">Draft Results — ${team}</div>
<div style="background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:20px 24px;margin-bottom:16px;display:flex;align-items:center;gap:16px;box-shadow:0 1px 8px rgba(0,0,0,0.04);">
  <div style="flex:1;">
    <div style="font-size:0.65rem;letter-spacing:0.15em;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">Team Context</div>
    <div style="font-size:0.88rem;color:var(--text-dim);line-height:1.5;">${tn.note||''}</div>
  </div>
  <div style="flex-shrink:0;">
    <div style="background:${sc}22;border:1px solid ${sc}55;color:${sc};padding:6px 14px;border-radius:6px;font-size:0.7rem;font-weight:700;letter-spacing:0.15em;">${sl}</div>
  </div>
</div>
<div class="overall-card">
  <div class="grade-circle ${gc}">${grade}</div>
  <div class="overall-info">
    <div class="overall-team">${team.toUpperCase()} DRAFT CLASS</div>
    <div class="overall-summary">${summary}</div>
  </div>
  <div class="overall-score">
    <div class="score-num">${score}</div>
    <div class="score-label">Draft Score</div>
  </div>
</div>`;
results.forEach((pick,i)=>{
  const{result,player,round}=pick;
  const p=result.prospect;
  const fit=result.fit||{};
  const fitColor=fit.label&&fit.label.includes('High')?'#16A34A':fit.label&&fit.label.includes('Good')?'#B8860B':'#EA580C';
  html+=`<div class="pick-result" style="animation-delay:${i*0.1}s">
    <div class="pick-result-header">
      <div>
        <div class="pick-meta">
          <span class="round-badge">Round ${round}</span>
          <span class="rank-badge">#${p.rank} Consensus</span>
          ${p.nhle?`<span class="rank-badge">NHLe ${p.nhle}</span>`:''}
          ${fit.label?`<span style="background:${fitColor}22;border:1px solid ${fitColor}55;color:${fitColor};padding:3px 10px;border-radius:4px;font-size:0.68rem;font-weight:600;letter-spacing:0.1em;">${fit.label}</span>`:''}
        </div>
        <div class="pick-name">${player}</div>
        <div class="pick-details">${p.pos} · ${p.league} · ${p.nation}</div>
      </div>
      <div class="pick-grade-badge ${result.gc}">${result.grade}</div>
    </div>
    <div class="stat-bars">${Object.entries(p.scores).map(([k,v])=>`<div class="stat-bar-item"><div class="stat-bar-label"><span class="stat-bar-name">${k.replace('_',' ')}</span><span class="stat-bar-value" style="color:${getBarColor(v)}">${v}</span></div><div class="bar-track"><div class="bar-fill" style="background:${getBarColor(v)}" data-target="${v}"></div></div></div>`).join('')}</div>
    <div class="pick-verdict">
      <strong style="color:var(--text-dim)">Scouting Report:</strong> ${p.verdict}<br><br>
      <strong style="color:var(--text-dim)">Value Assessment:</strong> ${result.roundVerdict}<br>
      ${fit.note?`<strong style="color:var(--text-dim)">Team Fit:</strong> ${fit.note}<br>`:''}
      <span class="comp-tag">Comp: <span>${p.comps}</span></span>
    </div>
  </div>`;
});
html+=`<div id="rosterDiagram"></div>
<div style="display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap;">
  <button onclick="shareGrade('twitter')" style="background:#0C0C0C;color:#FAF8F3;border:none;padding:14px 28px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;letter-spacing:0.05em;">&#120143; Share on X</button>
</div>`;
c.innerHTML=html;
window._shareData={team,grade,score,summary,results};
setTimeout(()=>{document.querySelectorAll('.bar-fill').forEach(b=>{b.style.width=b.dataset.target+'%';});},100);// Share buttons
html += `
<div style="display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap;">

</div>`;
c.innerHTML=html;
window._shareData={team,grade,score,summary,results};
setTimeout(()=>{document.querySelectorAll('.bar-fill').forEach(b=>{b.style.width=b.dataset.target+'%';});},100);
// Async roster diagram
buildRosterDiagram(team, results);
c.scrollIntoView({behavior:'smooth',block:'start'});}

function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function gradeCol(g){return{'A+':'#22C55E','A':'#22C55E','A-':'#22C55E','B+':'#86EFAC','B':'#86EFAC','B-':'#86EFAC','C+':'#EAB308','C':'#EAB308','D':'#F97316','F':'#EF4444'}[g]||'#22C55E';}

function shareGrade(action){
  const d=window._shareData;
  if(!d)return;

  const SCALE=2;
  const W=1200,HEADER=180,PICK_H=88,GAP=12,FOOTER=64;
  const H=HEADER+(d.results.length*(PICK_H+GAP))-GAP+FOOTER+40;

  const canvas=document.createElement('canvas');
  canvas.width=W*SCALE; canvas.height=H*SCALE;
  const ctx=canvas.getContext('2d');
  ctx.scale(SCALE,SCALE);

  // ── BACKGROUND ──
  ctx.fillStyle='#0D0F12';
  ctx.fillRect(0,0,W,H);

  // Subtle grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';
  ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Gold top accent line
  const grad=ctx.createLinearGradient(0,0,W,0);
  grad.addColorStop(0,'transparent');
  grad.addColorStop(0.3,'#B8860B');
  grad.addColorStop(0.7,'#D4AF37');
  grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,3);

  // ── HEADER ──
  // Brand
  ctx.fillStyle='#FFFFFF';
  ctx.font='bold 38px Arial,sans-serif';
  ctx.fillText('GRADE',40,62);
  ctx.fillStyle='#B8860B';
  ctx.fillText(' MY DRAFT',155,62);

  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.font='500 13px Arial,sans-serif';
  ctx.fillText('2026 NHL DRAFT GRADE TOOL',40,84);

  // Divider
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fillRect(40,100,W-80,1);

  // Team name
  ctx.fillStyle='#F0F2F5';
  ctx.font='bold 28px Arial,sans-serif';
  ctx.fillText(d.team.toUpperCase()+' DRAFT CLASS',40,140);

  // Summary text
  ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.font='500 14px Arial,sans-serif';
  ctx.fillText(d.summary.length>80?d.summary.substring(0,80)+'…':d.summary,40,164);

  // Big grade + score on right
  const gc=gradeCol(d.grade);
  // Glow
  const glow=ctx.createRadialGradient(W-100,110,5,W-100,110,60);
  glow.addColorStop(0,gc.replace(')',',0.25)').replace('rgb','rgba'));
  glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow;
  ctx.fillRect(W-180,50,160,120);

  // Circle
  ctx.beginPath();
  ctx.arc(W-100,108,46,0,Math.PI*2);
  ctx.strokeStyle=gc;ctx.lineWidth=2.5;ctx.stroke();

  ctx.fillStyle=gc;
  ctx.font='bold 52px Arial,sans-serif';
  ctx.textAlign='center';
  ctx.fillText(d.grade,W-100,124);

  ctx.fillStyle='#B8860B';
  ctx.font='bold 13px Arial,sans-serif';
  ctx.fillText(d.score+' / 100',W-100,152);
  ctx.textAlign='left';

  // ── PICKS ──
  let y=HEADER+16;
  d.results.forEach((pick)=>{
    const p=pick.result.prospect;
    const pg=pick.result.grade;
    const pgc=gradeCol(pg);

    // Card background
    ctx.fillStyle='#13161A';
    rr(ctx,40,y,W-80,PICK_H,10);
    ctx.fill();

    // Left accent bar
    ctx.fillStyle=pgc;
    ctx.fillRect(40,y,4,PICK_H);

    // Round badge
    ctx.fillStyle='rgba(184,134,11,0.18)';
    rr(ctx,60,y+14,90,22,5);
    ctx.fill();
    ctx.fillStyle='#B8860B';
    ctx.font='bold 10px Arial,sans-serif';
    ctx.fillText('ROUND '+pick.round,68,y+29);

    // Rank badge
    ctx.fillStyle='rgba(255,255,255,0.07)';
    rr(ctx,160,y+14,110,22,5);
    ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.font='bold 10px Arial,sans-serif';
    ctx.fillText('#'+p.rank+' CONSENSUS',168,y+29);

    // NHLe badge
    if(p.nhle){
      ctx.fillStyle='rgba(255,255,255,0.07)';
      rr(ctx,280,y+14,90,22,5);
      ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.fillText('NHLe '+p.nhle,288,y+29);
    }

    // Player name
    ctx.fillStyle='#F0F2F5';
    ctx.font='bold 20px Arial,sans-serif';
    ctx.fillText(pick.player,60,y+58);

    // Position · League
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.font='500 12px Arial,sans-serif';
    ctx.fillText(p.pos+' · '+p.league+' · '+p.nation,60,y+76);

    // Grade on right
    ctx.fillStyle=pgc;
    ctx.font='bold 28px Arial,sans-serif';
    ctx.textAlign='right';
    ctx.fillText(pg,W-60,y+58);
    ctx.textAlign='left';

    // Mini stat bars
    const bars=Object.values(p.scores);
    const totalBarW=340;
    const bw=(totalBarW-(bars.length-1)*6)/bars.length;
    const bx=W-80-totalBarW;
    const by=y+70;
    bars.forEach((v,i)=>{
      const x2=bx+i*(bw+6);
      ctx.fillStyle='rgba(255,255,255,0.08)';
      ctx.fillRect(x2,by,bw,3);
      const bc=v>=85?'#22C55E':v>=70?'#86EFAC':v>=55?'#EAB308':v>=40?'#F97316':'#EF4444';
      ctx.fillStyle=bc;
      ctx.fillRect(x2,by,bw*(v/100),3);
    });

    y+=PICK_H+GAP;
  });

  // ── FOOTER ──
  y+=8;
  ctx.fillStyle='rgba(255,255,255,0.06)';
  ctx.fillRect(40,y,W-80,1);

  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.font='500 12px Arial,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('grademydraft.com  ·  2026 NHL DRAFT GRADE TOOL',W/2,y+28);
  ctx.textAlign='left';

  // Gold bottom accent
  ctx.fillStyle=grad;
  ctx.fillRect(0,H-3,W,3);

  if(action==='twitter'){
    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const tweetText=encodeURIComponent(`Just graded the ${d.team} 2026 NHL Draft class — they got an ${d.grade} (${d.score}/100). Grade your team's picks at grademydraft.com #NHLDraft #NHL2026`);
      // Download image first then open Twitter
      const a=document.createElement('a');
      a.href=url;a.download=d.team.replace(/\s+/g,'-')+'-draft-grade.png';a.click();
      setTimeout(()=>{ window.open('https://twitter.com/intent/tweet?text='+tweetText,'_blank'); },800);
    });
  } else {
    const a=document.createElement('a');
    a.download=d.team.replace(/\s+/g,'-')+'-2026-draft-grade.png';
    a.href=canvas.toDataURL('image/png');
    a.click();
  }
}
init();
</script>
